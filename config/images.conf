# Waydroid Customizer – Upstream Image Sources
#
# Versions and URLs are pinned here.  The update-check workflow compares these
# against live SourceForge listings and opens a PR when newer images appear.
#
# Format per image:
#   <KEY>_VERSION  – date tag in the filename (YYYYMMDD)
#   <KEY>_URL      – direct download URL
#   <KEY>_SHA256   – expected SHA-256 (leave empty to skip verification)

# ─── Upstream version tag ────────────────────────────────────────────────────
UPSTREAM_DATE="20250628"
LINEAGE_VERSION="18.1"
ARCH="waydroid_x86_64"

# ─── Vendor image ────────────────────────────────────────────────────────────
VENDOR_VERSION="${UPSTREAM_DATE}"
VENDOR_FILENAME="lineage-${LINEAGE_VERSION}-${UPSTREAM_DATE}-MAINLINE-${ARCH}-vendor.zip"
VENDOR_URL="https://sourceforge.net/projects/waydroid/files/images/vendor/${ARCH}/${VENDOR_FILENAME}/download"
VENDOR_SHA256=""

# ─── System – VANILLA ────────────────────────────────────────────────────────
SYSTEM_VANILLA_VERSION="${UPSTREAM_DATE}"
SYSTEM_VANILLA_FILENAME="lineage-${LINEAGE_VERSION}-${UPSTREAM_DATE}-VANILLA-${ARCH}-system.zip"
SYSTEM_VANILLA_URL="https://sourceforge.net/projects/waydroid/files/images/system/lineage/${ARCH}/${SYSTEM_VANILLA_FILENAME}/download"
SYSTEM_VANILLA_SHA256=""

# ─── System – GAPPS ──────────────────────────────────────────────────────────
SYSTEM_GAPPS_VERSION="${UPSTREAM_DATE}"
SYSTEM_GAPPS_FILENAME="lineage-${LINEAGE_VERSION}-${UPSTREAM_DATE}-GAPPS-${ARCH}-system.zip"
SYSTEM_GAPPS_URL="https://sourceforge.net/projects/waydroid/files/images/system/lineage/${ARCH}/${SYSTEM_GAPPS_FILENAME}/download"
SYSTEM_GAPPS_SHA256=""

# ─── SourceForge listing URLs (for update-check) ─────────────────────────────
SF_VENDOR_INDEX="https://sourceforge.net/projects/waydroid/files/images/vendor/${ARCH}/"
SF_SYSTEM_INDEX="https://sourceforge.net/projects/waydroid/files/images/system/lineage/${ARCH}/"
