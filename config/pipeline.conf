# Waydroid Customizer – Pipeline Configuration
# Edit this file to tune pipeline behavior.
# Image-source URLs live in images.conf.

# ─── Work directories ────────────────────────────────────────────────────────
WORK_DIR="${WORK_DIR:-${REPO_ROOT}/work}"
DOWNLOAD_DIR="${WORK_DIR}/downloads"
UNPACK_DIR="${WORK_DIR}/unpacked"
MOUNT_DIR="${WORK_DIR}/mnt"
OUTPUT_DIR="${WORK_DIR}/output"
STATE_DIR="${WORK_DIR}/state"

# ─── Build variant ───────────────────────────────────────────────────────────
# One of: vanilla  gapps  both
BUILD_VARIANT="${BUILD_VARIANT:-both}"

# ─── Feature flags ───────────────────────────────────────────────────────────
ENABLE_ARM_TRANSLATION="${ENABLE_ARM_TRANSLATION:-true}"
ENABLE_SPOOF="${ENABLE_SPOOF:-true}"
ENABLE_WIDEVINE="${ENABLE_WIDEVINE:-true}"

# ─── ARM translation backend ─────────────────────────────────────────────────
# houdini   – Intel libhoudini (requires binary assets in modules/arm-translation/assets/)
# ndk       – Android NDK translation (libndk_translation, extracted from ChromeOS)
# auto      – try houdini first, fall back to ndk
ARM_TRANSLATION_BACKEND="${ARM_TRANSLATION_BACKEND:-auto}"

# ─── Device spoof profile ────────────────────────────────────────────────────
# Profile name (JSON file in modules/spoof/profiles/ without the .json extension)
SPOOF_PROFILE="${SPOOF_PROFILE:-pixel-6a}"

# ─── Image resize headroom ───────────────────────────────────────────────────
# Extra bytes to add to system/vendor image when resizing for injected files.
# 128 MiB default – covers ARM translation libs + overlays.
SYSTEM_EXTRA_BYTES="${SYSTEM_EXTRA_BYTES:-$((128 * 1024 * 1024))}"
VENDOR_EXTRA_BYTES="${VENDOR_EXTRA_BYTES:-$((32 * 1024 * 1024))}"

# ─── Parallelism ─────────────────────────────────────────────────────────────
MAKE_JOBS="${MAKE_JOBS:-$(nproc)}"

# ─── Artifact naming ─────────────────────────────────────────────────────────
ARTIFACT_PREFIX="${ARTIFACT_PREFIX:-waydroid-custom}"
